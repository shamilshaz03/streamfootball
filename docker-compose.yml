version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-football_db}
      POSTGRES_USER:     ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-football}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football}"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/app/static/uploads
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-football}:${POSTGRES_PASSWORD:-football}@db:5432/${POSTGRES_DB:-football_db}
      REDIS_URL:    redis://redis:6379/0

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000/api/v1

  # ── React Admin Panel ─────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin-panel
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
  uploads:
